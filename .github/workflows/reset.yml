name: Daily Schedule Reset
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
jobs:
  reset:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate and push new schedule
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/post.yml
          python src/generate_schedule.py
          git add .github/workflows/post.yml
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Daily schedule reset"
          git push --force-with-lease origin HEAD:main
