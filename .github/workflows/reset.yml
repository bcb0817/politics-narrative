name: Daily Schedule Reset
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: daily-schedule-reset
  cancel-in-progress: false
jobs:
  reset:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate and update schedule via API
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python src/generate_schedule.py
