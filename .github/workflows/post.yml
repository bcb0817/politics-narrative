name: X Auto Post Bot

on:
  schedule:
    - cron: '17 21 * * *'  # JST 06:17
    - cron: '47 21 * * *'  # JST 06:47
    - cron: '15 22 * * *'  # JST 07:15
    - cron: '32 22 * * *'  # JST 07:32
    - cron: '46 22 * * *'  # JST 07:46
    - cron: '6 23 * * *'  # JST 08:06
    - cron: '22 23 * * *'  # JST 08:22
    - cron: '41 23 * * *'  # JST 08:41
    - cron: '57 23 * * *'  # JST 08:57
    - cron: '15 2 * * *'  # JST 11:15
    - cron: '52 2 * * *'  # JST 11:52
    - cron: '6 3 * * *'  # JST 12:06
    - cron: '20 8 * * *'  # JST 17:20
    - cron: '44 8 * * *'  # JST 17:44
    - cron: '25 9 * * *'  # JST 18:25
    - cron: '48 9 * * *'  # JST 18:48
    - cron: '14 10 * * *'  # JST 19:14
    - cron: '27 10 * * *'  # JST 19:27
    - cron: '55 10 * * *'  # JST 19:55
    - cron: '26 12 * * *'  # JST 21:26
    - cron: '52 12 * * *'  # JST 21:52
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

concurrency:
  group: x-auto-post-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore posted URLs cache
        uses: actions/cache@v4
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
          restore-keys: |
            posted-urls-

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=Asia/Tokyo date +%H)
            if [ "$HOUR" = "06" ] || [ "$HOUR" = "11" ] || [ "$HOUR" = "17" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              RAND=$((RANDOM % 2))
              if [ "$RAND" = "0" ]; then
                echo "mode=normal" >> $GITHUB_OUTPUT
              else
                echo "mode=diagram" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}

      - name: Save posted URLs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
