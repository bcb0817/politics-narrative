name: X Auto Post Bot

on:
  schedule:
    - cron: '5 21 * * *'  # JST 06:05
    - cron: '18 21 * * *'  # JST 06:18
    - cron: '41 21 * * *'  # JST 06:41
    - cron: '56 21 * * *'  # JST 06:56
    - cron: '18 22 * * *'  # JST 07:18
    - cron: '35 22 * * *'  # JST 07:35
    - cron: '53 22 * * *'  # JST 07:53
    - cron: '24 23 * * *'  # JST 08:24
    - cron: '44 23 * * *'  # JST 08:44
    - cron: '12 2 * * *'  # JST 11:12
    - cron: '30 3 * * *'  # JST 12:30
    - cron: '45 3 * * *'  # JST 12:45
    - cron: '12 8 * * *'  # JST 17:12
    - cron: '33 8 * * *'  # JST 17:33
    - cron: '45 8 * * *'  # JST 17:45
    - cron: '35 10 * * *'  # JST 19:35
    - cron: '57 10 * * *'  # JST 19:57
    - cron: '29 11 * * *'  # JST 20:29
    - cron: '45 11 * * *'  # JST 20:45
    - cron: '13 12 * * *'  # JST 21:13
    - cron: '25 12 * * *'  # JST 21:25
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

concurrency:
  group: x-auto-post-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore posted URLs cache
        uses: actions/cache@v4
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
          restore-keys: |
            posted-urls-

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=Asia/Tokyo date +%H)
            if [ "$HOUR" = "06" ] || [ "$HOUR" = "11" ] || [ "$HOUR" = "17" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              RAND=$((RANDOM % 2))
              if [ "$RAND" = "0" ]; then
                echo "mode=normal" >> $GITHUB_OUTPUT
              else
                echo "mode=diagram" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}

      - name: Save posted URLs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
