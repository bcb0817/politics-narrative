name: X Auto Post Bot

on:
  schedule:
    - cron: '7 21 * * *'  # JST 06:07
    - cron: '20 21 * * *'  # JST 06:20
    - cron: '33 21 * * *'  # JST 06:33
    - cron: '47 21 * * *'  # JST 06:47
    - cron: '9 22 * * *'  # JST 07:09
    - cron: '24 22 * * *'  # JST 07:24
    - cron: '36 22 * * *'  # JST 07:36
    - cron: '51 22 * * *'  # JST 07:51
    - cron: '13 23 * * *'  # JST 08:13
    - cron: '28 23 * * *'  # JST 08:28
    - cron: '44 23 * * *'  # JST 08:44
    - cron: '57 23 * * *'  # JST 08:57
    - cron: '18 2 * * *'  # JST 11:18
    - cron: '36 2 * * *'  # JST 11:36
    - cron: '16 3 * * *'  # JST 12:16
    - cron: '50 3 * * *'  # JST 12:50
    - cron: '15 8 * * *'  # JST 17:15
    - cron: '42 8 * * *'  # JST 17:42
    - cron: '19 9 * * *'  # JST 18:19
    - cron: '37 9 * * *'  # JST 18:37
    - cron: '54 9 * * *'  # JST 18:54
    - cron: '21 10 * * *'  # JST 19:21
    - cron: '55 10 * * *'  # JST 19:55
    - cron: '15 11 * * *'  # JST 20:15
    - cron: '38 11 * * *'  # JST 20:38
    - cron: '6 12 * * *'  # JST 21:06
    - cron: '30 12 * * *'  # JST 21:30
    - cron: '46 12 * * *'  # JST 21:46
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

concurrency:
  group: x-auto-post-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore posted URLs cache
        uses: actions/cache@v4
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
          restore-keys: |
            posted-urls-

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=Asia/Tokyo date +%H)
            if [ "$HOUR" = "06" ] || [ "$HOUR" = "11" ] || [ "$HOUR" = "17" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              RAND=$((RANDOM % 2))
              if [ "$RAND" = "0" ]; then
                echo "mode=normal" >> $GITHUB_OUTPUT
              else
                echo "mode=diagram" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}

      - name: Save posted URLs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
