name: X Auto Post Bot

on:
  schedule:
    - cron: '16 21 * * *'  # JST 06:16
    - cron: '31 21 * * *'  # JST 06:31
    - cron: '44 21 * * *'  # JST 06:44
    - cron: '5 22 * * *'  # JST 07:05
    - cron: '17 22 * * *'  # JST 07:17
    - cron: '30 22 * * *'  # JST 07:30
    - cron: '42 22 * * *'  # JST 07:42
    - cron: '55 22 * * *'  # JST 07:55
    - cron: '18 23 * * *'  # JST 08:18
    - cron: '31 23 * * *'  # JST 08:31
    - cron: '45 23 * * *'  # JST 08:45
    - cron: '22 2 * * *'  # JST 11:22
    - cron: '46 2 * * *'  # JST 11:46
    - cron: '20 3 * * *'  # JST 12:20
    - cron: '5 8 * * *'  # JST 17:05
    - cron: '23 8 * * *'  # JST 17:23
    - cron: '40 8 * * *'  # JST 17:40
    - cron: '6 9 * * *'  # JST 18:06
    - cron: '19 9 * * *'  # JST 18:19
    - cron: '32 9 * * *'  # JST 18:32
    - cron: '56 9 * * *'  # JST 18:56
    - cron: '11 10 * * *'  # JST 19:11
    - cron: '35 10 * * *'  # JST 19:35
    - cron: '55 10 * * *'  # JST 19:55
    - cron: '47 11 * * *'  # JST 20:47
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

concurrency:
  group: x-auto-post-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore posted URLs cache
        uses: actions/cache@v4
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
          restore-keys: |
            posted-urls-

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=Asia/Tokyo date +%H)
            if [ "$HOUR" = "06" ] || [ "$HOUR" = "11" ] || [ "$HOUR" = "17" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              RAND=$((RANDOM % 2))
              if [ "$RAND" = "0" ]; then
                echo "mode=normal" >> $GITHUB_OUTPUT
              else
                echo "mode=diagram" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}

      - name: Save posted URLs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
