name: X Auto Post Bot

on:
  schedule:
    - cron: '0 21 * * *'
    - cron: '38 21 * * *'
    - cron: '46 21 * * *'
    - cron: '49 21 * * *'
    - cron: '10 22 * * *'
    - cron: '23 22 * * *'
    - cron: '30 22 * * *'
    - cron: '35 22 * * *'
    - cron: '37 22 * * *'
    - cron: '41 22 * * *'
    - cron: '47 22 * * *'
    - cron: '5 23 * * *'
    - cron: '14 23 * * *'
    - cron: '4 3 * * *'
    - cron: '30 3 * * *'
    - cron: '36 3 * * *'
    - cron: '48 3 * * *'
    - cron: '15 8 * * *'
    - cron: '23 8 * * *'
    - cron: '28 8 * * *'
    - cron: '35 8 * * *'
    - cron: '56 8 * * *'
    - cron: '26 9 * * *'
    - cron: '21 10 * * *'
    - cron: '30 10 * * *'
    - cron: '55 10 * * *'
    - cron: '40 11 * * *'
    - cron: '59 11 * * *'
    - cron: '37 12 * * *'
    - cron: '39 12 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / test）'
        required: false
        default: 'test'

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore posted URLs cache
        uses: actions/cache@v4
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
          restore-keys: |
            posted-urls-

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "21" ] || [ "$HOUR" = "22" ] || [ "$HOUR" = "02" ] || [ "$HOUR" = "08" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              echo "mode=normal" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}

      - name: Save posted URLs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
