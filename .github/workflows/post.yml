name: X Auto Post Bot

on:
  schedule:
    - cron: '6 21 * * *'  # JST 06:06
    - cron: '21 21 * * *'  # JST 06:21
    - cron: '48 21 * * *'  # JST 06:48
    - cron: '9 22 * * *'  # JST 07:09
    - cron: '23 22 * * *'  # JST 07:23
    - cron: '35 22 * * *'  # JST 07:35
    - cron: '57 22 * * *'  # JST 07:57
    - cron: '16 23 * * *'  # JST 08:16
    - cron: '28 23 * * *'  # JST 08:28
    - cron: '42 23 * * *'  # JST 08:42
    - cron: '5 2 * * *'  # JST 11:05
    - cron: '26 2 * * *'  # JST 11:26
    - cron: '18 3 * * *'  # JST 12:18
    - cron: '31 8 * * *'  # JST 17:31
    - cron: '50 8 * * *'  # JST 17:50
    - cron: '41 9 * * *'  # JST 18:41
    - cron: '27 10 * * *'  # JST 19:27
    - cron: '55 10 * * *'  # JST 19:55
    - cron: '14 11 * * *'  # JST 20:14
    - cron: '26 11 * * *'  # JST 20:26
    - cron: '10 12 * * *'  # JST 21:10
    - cron: '28 12 * * *'  # JST 21:28
    - cron: '49 12 * * *'  # JST 21:49
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

concurrency:
  group: x-auto-post-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore posted URLs cache
        uses: actions/cache@v4
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
          restore-keys: |
            posted-urls-

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=Asia/Tokyo date +%H)
            if [ "$HOUR" = "06" ] || [ "$HOUR" = "11" ] || [ "$HOUR" = "17" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              RAND=$((RANDOM % 2))
              if [ "$RAND" = "0" ]; then
                echo "mode=normal" >> $GITHUB_OUTPUT
              else
                echo "mode=diagram" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}

      - name: Save posted URLs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
