name: X Auto Post Bot

on:
  schedule:
    - cron: '2 21 * * *'
    - cron: '18 21 * * *'
    - cron: '23 21 * * *'
    - cron: '30 21 * * *'
    - cron: '39 21 * * *'
    - cron: '48 21 * * *'
    - cron: '45 22 * * *'
    - cron: '0 23 * * *'
    - cron: '9 23 * * *'
    - cron: '21 23 * * *'
    - cron: '28 23 * * *'
    - cron: '34 23 * * *'
    - cron: '56 23 * * *'
    - cron: '0 2 * * *'
    - cron: '24 2 * * *'
    - cron: '39 2 * * *'
    - cron: '2 3 * * *'
    - cron: '12 8 * * *'
    - cron: '38 8 * * *'
    - cron: '48 8 * * *'
    - cron: '9 10 * * *'
    - cron: '20 10 * * *'
    - cron: '43 10 * * *'
    - cron: '7 11 * * *'
    - cron: '39 11 * * *'
    - cron: '59 11 * * *'
    - cron: '6 12 * * *'
    - cron: '31 12 * * *'
    - cron: '41 12 * * *'
    - cron: '57 12 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore posted URLs cache
        uses: actions/cache@v4
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
          restore-keys: |
            posted-urls-

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "21" ] || [ "$HOUR" = "22" ] || [ "$HOUR" = "02" ] || [ "$HOUR" = "08" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              RAND=$((RANDOM % 2))
              if [ "$RAND" = "0" ]; then
                echo "mode=normal" >> $GITHUB_OUTPUT
              else
                echo "mode=diagram" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}

      - name: Save posted URLs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
